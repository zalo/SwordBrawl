async function initPhysX() {
    setStatus('Loading PhysX WASM...');

    const module = await import('https://cdn.jsdelivr.net/npm/physx-js-webidl@2.7.2/physx-js-webidl.mjs');
    PhysX = await module.default({
        locateFile: () => 'https://cdn.jsdelivr.net/npm/physx-js-webidl@2.7.2/physx-js-webidl.wasm'
    });
    console.log('PhysX WASM loaded');

    E_TWIST   = PhysX.PxArticulationAxisEnum.eTWIST;
    E_SWING1  = PhysX.PxArticulationAxisEnum.eSWING1;
    E_SWING2  = PhysX.PxArticulationAxisEnum.eSWING2;
    E_LIMITED = PhysX.PxArticulationMotionEnum.eLIMITED;
    E_LOCKED  = PhysX.PxArticulationMotionEnum.eLOCKED;
    E_SPHERICAL = PhysX.PxArticulationJointTypeEnum.eSPHERICAL;
    E_REVOLUTE  = PhysX.PxArticulationJointTypeEnum.eREVOLUTE;
    E_FIX       = PhysX.PxArticulationJointTypeEnum.eFIX;
    E_FORCE     = PhysX.PxArticulationDriveTypeEnum.eFORCE;
    E_CACHE_ALL = PhysX.PxArticulationCacheFlagEnum.eALL;
    SHAPE_FLAGS_VAL = PhysX.PxShapeFlagEnum.eSCENE_QUERY_SHAPE | PhysX.PxShapeFlagEnum.eSIMULATION_SHAPE;

    const tlf = PhysX.PxTopLevelFunctions.prototype;
    const version = PhysX.PHYSICS_VERSION;
    const allocator = new PhysX.PxDefaultAllocator();
    const errorCb = new PhysX.PxDefaultErrorCallback();
    foundation = tlf.CreateFoundation(version, allocator, errorCb);

    const tolerances = new PhysX.PxTolerancesScale();
    physics = tlf.CreatePhysics(version, foundation, tolerances);

    const cpuDispatcher = tlf.DefaultCpuDispatcherCreate(0);
    const sceneDesc = new PhysX.PxSceneDesc(tolerances);
    sceneDesc.set_gravity(new PhysX.PxVec3(0, 0, -9.81));
    sceneDesc.set_cpuDispatcher(cpuDispatcher);
    sceneDesc.set_filterShader(tlf.DefaultFilterShader());
    sceneDesc.set_bounceThresholdVelocity(0.2);
    if (PhysX.PxSolverTypeEnum && PhysX.PxSolverTypeEnum.ePGS !== undefined) {
        sceneDesc.set_solverType(PhysX.PxSolverTypeEnum.ePGS);
        console.log('Using PGS solver (matching Isaac Lab)');
    } else {
        console.log('PGS solver enum not found, using default (should be PGS)');
    }
    if (typeof sceneDesc.set_frictionType === 'function') {
        sceneDesc.set_frictionType(PhysX.PxFrictionTypeEnum.ePATCH);
    }
    if (typeof sceneDesc.set_frictionCorrelationDistance === 'function') {
        sceneDesc.set_frictionCorrelationDistance(0.025);
    }
    if (typeof sceneDesc.set_frictionOffsetThreshold === 'function') {
        sceneDesc.set_frictionOffsetThreshold(0.04);
    }
    if (typeof sceneDesc.set_maxBiasCoefficient === 'function') {
        sceneDesc.set_maxBiasCoefficient(100);
    }
    pxScene = physics.createScene(sceneDesc);

    material = physics.createMaterial(1.0, 1.0, 0.0);

    const groundShapeFlags = new PhysX.PxShapeFlags(SHAPE_FLAGS_VAL);
    const groundGeom = new PhysX.PxBoxGeometry(50, 50, 0.5);
    const groundShape = physics.createShape(groundGeom, material, true, groundShapeFlags);
    const groundFilterData = new PhysX.PxFilterData(1, 7, 0, 0);
    groundShape.setSimulationFilterData(groundFilterData);
    const groundPose = new PhysX.PxTransform(
        new PhysX.PxVec3(0, 0, -0.5),
        new PhysX.PxQuat(0, 0, 0, 1)
    );
    groundActor = physics.createRigidStatic(groundPose);
    groundActor.attachShape(groundShape);
    pxScene.addActor(groundActor);
    groundRemoved = false;

    console.log('PhysX scene created');
}

// ---------------------------------------------------------------------------
// Build PhysX articulation from humanoid data
// ---------------------------------------------------------------------------
function buildArticulation() {
    setStatus('Building humanoid articulation...');

    const shapeFlags = new PhysX.PxShapeFlags(SHAPE_FLAGS_VAL);
    const rbext = PhysX.PxRigidBodyExt.prototype;

    articulation = physics.createArticulationReducedCoordinate();
    articulation.setSolverIterationCounts(4, 0);
    if (typeof articulation.setSleepThreshold === 'function') {
        articulation.setSleepThreshold(5e-5);
    }
    if (typeof articulation.setStabilizationThreshold === 'function') {
        articulation.setStabilizationThreshold(1e-5);
    }
    articulation.setArticulationFlag(
        PhysX.PxArticulationFlagEnum.eDISABLE_SELF_COLLISION, true
    );

    const bodyLinkMap = {};
    links = [];

    for (const body of humanoidData.bodies) {
        const wp = body.pos;
        const zOff = humanoidData.tpose_pelvis_z || humanoidData.pelvis_z;
        const pose = new PhysX.PxTransform(
            new PhysX.PxVec3(wp[0], wp[1], wp[2] + zOff),
            new PhysX.PxQuat(0, 0, 0, 1)
        );

        const parentLink = body.parent ? bodyLinkMap[body.parent] : null;
        const link = articulation.createLink(parentLink, pose);

        for (const geom of body.geoms) {
            let shape = null;
            if (geom.type === 'sphere') {
                const g = new PhysX.PxSphereGeometry(geom.radius);
                shape = physics.createShape(g, material, true, shapeFlags);
                const lp = geom.pos;
                shape.setLocalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(lp[0], lp[1], lp[2]),
                    new PhysX.PxQuat(0, 0, 0, 1)
                ));
            } else if (geom.type === 'capsule' && geom.fromto) {
                const ft = geom.fromto;
                const p0 = [ft[0], ft[1], ft[2]];
                const p1 = [ft[3], ft[4], ft[5]];
                const dx = p1[0]-p0[0], dy = p1[1]-p0[1], dz = p1[2]-p0[2];
                const len = Math.sqrt(dx*dx+dy*dy+dz*dz);
                const halfH = Math.max(len / 2, 0.001);
                const g = new PhysX.PxCapsuleGeometry(geom.radius, halfH);
                shape = physics.createShape(g, material, true, shapeFlags);
                const mid = [(p0[0]+p1[0])/2, (p0[1]+p1[1])/2, (p0[2]+p1[2])/2];
                const dir = len > 0.001 ? [dx/len, dy/len, dz/len] : [1,0,0];
                const q = quatFromTwoVec([1,0,0], dir);
                shape.setLocalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(mid[0], mid[1], mid[2]),
                    new PhysX.PxQuat(q[0], q[1], q[2], q[3])
                ));
            } else if (geom.type === 'box') {
                const he = geom.halfExtents;
                const g = new PhysX.PxBoxGeometry(he[0], he[1], he[2]);
                shape = physics.createShape(g, material, true, shapeFlags);
                const lp = geom.pos;
                shape.setLocalPose(new PhysX.PxTransform(
                    new PhysX.PxVec3(lp[0], lp[1], lp[2]),
                    new PhysX.PxQuat(0, 0, 0, 1)
                ));
            } else if (geom.type === 'cylinder') {
                const r = geom.radius;
                const hh = geom.halfHeight || 0.015;
                const nSides = 16;

                const vec = new PhysX.Vector_PxVec3();
                for (let ring = 0; ring < 2; ring++) {
                    const z = ring === 0 ? -hh : hh;
                    for (let i = 0; i < nSides; i++) {
                        const a = (2 * Math.PI * i) / nSides;
                        vec.push_back(new PhysX.PxVec3(r * Math.cos(a), r * Math.sin(a), z));
                    }
                }
                const desc = new PhysX.PxConvexMeshDesc();
                const bd = new PhysX.PxBoundedData();
                bd.set_count(vec.size());
                bd.set_stride(12);
                bd.set_data(vec.data());
                desc.set_points(bd);
                desc.set_flags(new PhysX.PxConvexFlags(PhysX.PxConvexFlagEnum.eCOMPUTE_CONVEX));
                const cookParams = new PhysX.PxCookingParams(new PhysX.PxTolerancesScale());
                const convexMesh = PhysX.PxTopLevelFunctions.prototype.CreateConvexMesh(cookParams, desc);

                if (convexMesh) {
                    const g = new PhysX.PxConvexMeshGeometry(convexMesh);
                    shape = physics.createShape(g, material, true, shapeFlags);

                    if (geom.fromto) {
                        const ft = geom.fromto;
                        const p0 = [ft[0], ft[1], ft[2]], p1 = [ft[3], ft[4], ft[5]];
                        const mid = [(p0[0]+p1[0])/2, (p0[1]+p1[1])/2, (p0[2]+p1[2])/2];
                        const dx = p1[0]-p0[0], dy = p1[1]-p0[1], dz = p1[2]-p0[2];
                        const len = Math.sqrt(dx*dx+dy*dy+dz*dz);
                        const dir = len > 0.001 ? [dx/len, dy/len, dz/len] : [0,0,1];
                        const q = quatFromTwoVec([0,0,1], dir);
                        shape.setLocalPose(new PhysX.PxTransform(
                            new PhysX.PxVec3(mid[0], mid[1], mid[2]),
                            new PhysX.PxQuat(q[0], q[1], q[2], q[3])
                        ));
                    } else {
                        const lp = geom.pos || [0,0,0];
                        shape.setLocalPose(new PhysX.PxTransform(
                            new PhysX.PxVec3(lp[0], lp[1], lp[2]),
                            new PhysX.PxQuat(0, 0, 0, 1)
                        ));
                    }
                } else {
                    console.warn('Convex mesh cooking failed for cylinder, falling back to capsule');
                    const g = new PhysX.PxCapsuleGeometry(r, hh);
                    shape = physics.createShape(g, material, true, shapeFlags);
                    const lp = geom.pos || [0,0,0];
                    const q = quatFromTwoVec([1,0,0], [0,0,1]);
                    shape.setLocalPose(new PhysX.PxTransform(
                        new PhysX.PxVec3(lp[0], lp[1], lp[2]),
                        new PhysX.PxQuat(q[0], q[1], q[2], q[3])
                    ));
                }
            }
            if (shape) {
                shape.setSimulationFilterData(new PhysX.PxFilterData(2, 5, 0, 0));
                link.attachShape(shape);
            }
        }

        if (body.mass && body.inertia && body.com) {
            link.setMass(body.mass);
            link.setMassSpaceInertiaTensor(new PhysX.PxVec3(body.inertia[0], body.inertia[1], body.inertia[2]));
            link.setCMassLocalPose(new PhysX.PxTransform(
                new PhysX.PxVec3(body.com[0], body.com[1], body.com[2]),
                new PhysX.PxQuat(0, 0, 0, 1)
            ));
        } else if (body.mass) {
            rbext.setMassAndUpdateInertia(link, body.mass);
        } else {
            rbext.updateMassAndInertia(link, 1000);
        }

        link.setAngularDamping(0.01);
        link.setLinearDamping(0.0);
        link.setMaxDepenetrationVelocity(10.0);
        link.setMaxLinearVelocity(1000.0);
        link.setMaxAngularVelocity(1000.0);
        if (typeof link.setSleepThreshold === 'function') {
            link.setSleepThreshold(5e-5);
        }
        if (typeof link.setStabilizationThreshold === 'function') {
            link.setStabilizationThreshold(1e-5);
        }
        if (typeof link.setCfmScale === 'function') {
            link.setCfmScale(0.025);
        }
        if (typeof link.setRigidBodyFlag === 'function') {
            try { link.setRigidBodyFlag(PhysX.PxRigidBodyFlagEnum.eENABLE_GYROSCOPIC_FORCES, true); } catch(e) {}
        }

        bodyLinkMap[body.name] = link;
        links.push({ name: body.name, link: link, meshGroup: null });
    }

    // Configure joints
    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];
    origDrives.length = 0;
    const driveScale = 1.0;

    for (const jdata of humanoidData.joints) {
        const childLink = bodyLinkMap[jdata.child_body];
        const joint = childLink.getInboundJoint();

        if (jdata.jointType === 'spherical') {
            joint.setJointType(E_SPHERICAL);
        } else {
            joint.setJointType(E_REVOLUTE);
        }

        joint.setFrictionCoefficient(0);
        if (typeof joint.setMaxJointVelocity === 'function') {
            joint.setMaxJointVelocity(1000000);
        }

        const lp = jdata.localPos0;
        const lr = jdata.localRot;

        const parentPose = new PhysX.PxTransform(
            new PhysX.PxVec3(lp[0], lp[1], lp[2]),
            new PhysX.PxQuat(lr[1], lr[2], lr[3], lr[0])
        );
        const childPose = new PhysX.PxTransform(
            new PhysX.PxVec3(0, 0, 0),
            new PhysX.PxQuat(lr[1], lr[2], lr[3], lr[0])
        );
        joint.setParentPose(parentPose);
        joint.setChildPose(childPose);

        if (jdata.jointType === 'spherical') {
            for (let i = 0; i < jdata.axes.length; i++) {
                const physAxis = jdata.axisMap[i];
                const axE = axisEnums[physAxis];
                joint.setMotion(axE, E_LIMITED);
                const ax = jdata.axes[i];
                const limit = new PhysX.PxArticulationLimit(ax.range[0], ax.range[1]);
                joint.setLimitParams(axE, limit);
                const drive = new PhysX.PxArticulationDrive(
                    ax.stiffness * driveScale, ax.damping * driveScale, ax.maxForce, E_FORCE
                );
                joint.setDriveParams(axE, drive);
                if (ax.armature !== undefined) joint.setArmature(axE, ax.armature);
                origDrives.push({joint, axisEnum: axE, stiffness: ax.stiffness * driveScale, damping: ax.damping * driveScale, maxForce: ax.maxForce});
            }
            for (let i = jdata.axes.length; i < 3; i++) {
                joint.setMotion(axisEnums[i], E_LOCKED);
            }
        } else {
            joint.setMotion(E_TWIST, E_LIMITED);
            const ax = jdata.axes[0];
            joint.setLimitParams(E_TWIST, new PhysX.PxArticulationLimit(ax.range[0], ax.range[1]));
            const revDrive = new PhysX.PxArticulationDrive(
                ax.stiffness * driveScale, ax.damping * driveScale, ax.maxForce, E_FORCE
            );
            joint.setDriveParams(E_TWIST, revDrive);
            if (ax.armature !== undefined) joint.setArmature(E_TWIST, ax.armature);
            origDrives.push({joint, axisEnum: E_TWIST, stiffness: ax.stiffness * driveScale, damping: ax.damping * driveScale, maxForce: ax.maxForce});
            joint.setMotion(E_SWING1, E_LOCKED);
            joint.setMotion(E_SWING2, E_LOCKED);
        }
    }

    // Fixed joints
    for (const fj of humanoidData.fixedJoints) {
        const childLink = bodyLinkMap[fj.child_body];
        const joint = childLink.getInboundJoint();
        joint.setJointType(E_FIX);
        const lp = fj.localPos0;
        joint.setParentPose(new PhysX.PxTransform(
            new PhysX.PxVec3(lp[0], lp[1], lp[2]),
            new PhysX.PxQuat(0, 0, 0, 1)
        ));
        joint.setChildPose(new PhysX.PxTransform(
            new PhysX.PxVec3(0, 0, 0),
            new PhysX.PxQuat(0, 0, 0, 1)
        ));
    }

    removeGround();
    pxScene.addArticulation(articulation);
    console.log('Articulation built with', links.length, 'links,', articulation.getDofs(), 'DOFs');

    applyInitPose();
    scheduleGroundRestore();
}

function applyInitPose() {
    if (!humanoidData.init_root_pos || !humanoidData.init_dof_pos) return;

    const rp = humanoidData.init_root_pos;
    const rq = humanoidData.init_root_rot_quat;
    const initDof = humanoidData.init_dof_pos;

    articulation.setRootGlobalPose(new PhysX.PxTransform(
        new PhysX.PxVec3(rp[0], rp[1], rp[2]),
        new PhysX.PxQuat(rq[0], rq[1], rq[2], rq[3])), true);
    const axisEnumsInit = [E_TWIST, E_SWING1, E_SWING2];
    const bodyLinkMapInit = {};
    for (const l of links) bodyLinkMapInit[l.name] = l.link;
    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
        const dof = humanoidData.dofInfo[i];
        const cl = bodyLinkMapInit[dof.child_body];
        if (!cl) continue;
        try {
            cl.getInboundJoint().setJointPosition(axisEnumsInit[dof.physx_axis], initDof[i]);
            cl.getInboundJoint().setJointVelocity(axisEnumsInit[dof.physx_axis], 0);
        } catch(e) {}
    }
    removeGround();
    const initFlags = new PhysX.PxArticulationCacheFlags(PhysX.PxArticulationCacheFlagEnum.eALL);
    const initCache = articulation.createCache();
    articulation.copyInternalStateToCache(initCache, initFlags);
    articulation.applyCache(initCache, initFlags, true);
    restoreGround();

    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];
    const bodyLinkMap = {};
    for (const l of links) bodyLinkMap[l.name] = l.link;
    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
        const dof = humanoidData.dofInfo[i];
        const childLink = bodyLinkMap[dof.child_body];
        if (!childLink) continue;
        try {
            childLink.getInboundJoint().setDriveTarget(axisEnums[dof.physx_axis], initDof[i]);
        } catch(e) {}
    }

    console.log('Applied init_pose via cache FK: root_z=' + rp[2] + ', dofs=' + initDof.length);
}

// ---------------------------------------------------------------------------
// Ground collision control
// ---------------------------------------------------------------------------
function removeGround() { if (groundActor && !groundRemoved) { pxScene.removeActor(groundActor); groundRemoved = true; } }
function restoreGround() { if (groundActor && groundRemoved) { pxScene.addActor(groundActor); groundRemoved = false; } }
let restoreGroundAfterStep = false;
function scheduleGroundRestore() { restoreGroundAfterStep = true; }

// ---------------------------------------------------------------------------
// Steering task: reset / update
// ---------------------------------------------------------------------------
function resetSteering() {
    // Random target movement direction
    const moveAngle = Math.random() * 2 * Math.PI;
    tarDir = [Math.cos(moveAngle), Math.sin(moveAngle)];

    // Random target speed between 1.4 and 1.7
    tarSpeed = 1.4 + Math.random() * 0.3;

    // Random target facing direction (independent)
    const faceAngle = Math.random() * 2 * Math.PI;
    faceDir = [Math.cos(faceAngle), Math.sin(faceAngle)];

    // Timer: 4-7 seconds until next change
    steeringChangeTime = performance.now() / 1000;
    nextSteeringInterval = 4 + Math.random() * 3;

    console.log('Steering reset: tarDir=[' + tarDir.map(v => v.toFixed(2)) + '], tarSpeed=' + tarSpeed.toFixed(2) +
        ', faceDir=[' + faceDir.map(v => v.toFixed(2)) + '], next change in ' + nextSteeringInterval.toFixed(1) + 's');
}

function updateSteering() {
    const now = performance.now() / 1000;
    if (now - steeringChangeTime >= nextSteeringInterval) {
        resetSteering();
    }

    // Update arrow positions to follow humanoid
    if (moveDirArrow && faceDirArrow && links.length > 0) {
        const rp = links[0].link.getGlobalPose().get_p();
        const rx = rp.get_x(), ry = rp.get_y();

        // Movement direction arrow (RED) - at ground level
        const moveLen = tarSpeed;  // length proportional to speed
        moveDirArrow.position.set(rx, ry, 0.05);
        const moveDirVec = new THREE.Vector3(tarDir[0], tarDir[1], 0).normalize();
        moveDirArrow.setDirection(moveDirVec);
        moveDirArrow.setLength(moveLen, Math.min(moveLen * 0.2, 0.3), Math.min(moveLen * 0.1, 0.15));
        moveDirArrow.visible = (currentMode === 'hrl');

        // Facing direction arrow (BLUE) - at ground level
        const faceLen = 1.0;
        faceDirArrow.position.set(rx, ry, 0.05);
        const faceDirVec = new THREE.Vector3(faceDir[0], faceDir[1], 0).normalize();
        faceDirArrow.setDirection(faceDirVec);
        faceDirArrow.setLength(faceLen, Math.min(faceLen * 0.2, 0.3), Math.min(faceLen * 0.1, 0.15));
        faceDirArrow.visible = (currentMode === 'hrl');
    }
}

// ---------------------------------------------------------------------------
// Debug helpers
// ---------------------------------------------------------------------------
function applyDriveParams() {
    for (const d of origDrives) {
        const drive = new PhysX.PxArticulationDrive(
            drivesEnabled ? d.stiffness * stiffnessScale : 0,
            drivesEnabled ? d.damping * dampingScale : 0,
            drivesEnabled ? d.maxForce : 0,
            E_FORCE
        );
        d.joint.setDriveParams(d.axisEnum, drive);
    }
}

function setSelfCollision(enabled) {
    selfCollisionEnabled = enabled;
    articulation.setArticulationFlag(
        PhysX.PxArticulationFlagEnum.eDISABLE_SELF_COLLISION, !enabled
    );
    for (const entry of links) {
        try {
            const nbShapes = entry.link.getNbShapes();
            for (let si = 0; si < nbShapes; si++) {
                const shape = (typeof entry.link.getShape === 'function')
                    ? entry.link.getShape(si)
                    : entry.link.getShapeAt ? entry.link.getShapeAt(si) : null;
                if (!shape) continue;
                if (enabled) {
                    shape.setSimulationFilterData(new PhysX.PxFilterData(2, 7, 0, 0));
                } else {
                    shape.setSimulationFilterData(new PhysX.PxFilterData(2, 1, 0, 0));
                }
            }
        } catch(e) {}
    }
}

function setGravity(enabled) {
    gravityEnabled = enabled;
    if (enabled) {
        pxScene.setGravity(new PhysX.PxVec3(0, 0, -9.81));
    } else {
        pxScene.setGravity(new PhysX.PxVec3(0, 0, 0));
    }
}

function updateDebugInfo() {
    try {
        const rootLink = links[0].link;
        const pose = rootLink.getGlobalPose();
        const vel = rootLink.getLinearVelocity();
        const rootZ = pose.get_p().get_z();
        const speed = Math.sqrt(vel.get_x()**2 + vel.get_y()**2 + vel.get_z()**2);

        let maxDofVel = 0;
        try {
            for (const d of origDrives) {
                const v = Math.abs(d.joint.getJointVelocity(d.axisEnum));
                if (v > maxDofVel) maxDofVel = v;
            }
        } catch(e) {}

        if (window._guiStats) {
            window._guiStats.root_z = +rootZ.toFixed(3);
            window._guiStats.root_speed = +speed.toFixed(3);
            window._guiStats.max_dof_vel = +maxDofVel.toFixed(1);
        }
    } catch(e) {}
}

// ---------------------------------------------------------------------------
// Three.js setup
// ---------------------------------------------------------------------------
const BODY_COLORS = {
    pelvis: 0x5577aa, torso: 0x5577aa, head: 0xcc8866,
    right_upper_arm: 0x77aa55, right_lower_arm: 0x77aa55, right_hand: 0xcc8866,
    sword: 0xcccccc,
    left_upper_arm: 0xaa7755, left_lower_arm: 0xaa7755, shield: 0x8888cc, left_hand: 0xcc8866,
    right_thigh: 0x5577aa, right_shin: 0x5577aa, right_foot: 0x555577,
    left_thigh: 0x5577aa, left_shin: 0x5577aa, left_foot: 0x555577,
};

function initThreeJS() {
    setStatus('Setting up renderer...');

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    scene3d = new THREE.Scene();
    scene3d.background = new THREE.Color(0x1a1a2e);
    scene3d.fog = new THREE.Fog(0x1a1a2e, 15, 40);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 2, 4);
    camera.lookAt(0, 1, 0);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.update();

    // Lights
    scene3d.add(new THREE.AmbientLight(0x404060, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -5;
    dirLight.shadow.camera.right = 5;
    dirLight.shadow.camera.top = 5;
    dirLight.shadow.camera.bottom = -5;
    scene3d.add(dirLight);
    scene3d.add(new THREE.HemisphereLight(0x8888cc, 0x444422, 0.4));

    // World group: rotates Z-up (PhysX/MJCF) to Y-up (Three.js)
    worldGroup = new THREE.Group();
    worldGroup.rotation.x = -Math.PI / 2;
    scene3d.add(worldGroup);

    // Ground plane + grid
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.9, metalness: 0.1 });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    groundMesh.receiveShadow = true;
    const grid = new THREE.GridHelper(40, 40, 0x3a3a5e, 0x2a2a4a);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = 0.001;
    worldGroup.add(groundMesh);
    worldGroup.add(grid);

    // Create meshes per body
    for (let bi = 0; bi < humanoidData.bodies.length; bi++) {
        const body = humanoidData.bodies[bi];
        const group = new THREE.Group();
        const color = BODY_COLORS[body.name] || 0x888888;

        for (const geom of body.geoms) {
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.2 });
            let mesh = null;

            if (geom.type === 'sphere') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(geom.radius, 16, 12), mat);
                const lp = geom.pos;
                mesh.position.set(lp[0], lp[1], lp[2]);
            } else if (geom.type === 'capsule' && geom.fromto) {
                const ft = geom.fromto;
                const p0 = new THREE.Vector3(ft[0], ft[1], ft[2]);
                const p1 = new THREE.Vector3(ft[3], ft[4], ft[5]);
                const dir = new THREE.Vector3().subVectors(p1, p0);
                const len = dir.length();
                mesh = new THREE.Mesh(new THREE.CapsuleGeometry(geom.radius, len, 8, 12), mat);
                mesh.position.addVectors(p0, p1).multiplyScalar(0.5);
                if (len > 0.001) {
                    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
                }
            } else if (geom.type === 'box') {
                const he = geom.halfExtents;
                mesh = new THREE.Mesh(new THREE.BoxGeometry(he[0]*2, he[1]*2, he[2]*2), mat);
                const lp = geom.pos;
                mesh.position.set(lp[0], lp[1], lp[2]);
            } else if (geom.type === 'cylinder') {
                const r = geom.radius;
                if (geom.fromto) {
                    const ft = geom.fromto;
                    const p0 = new THREE.Vector3(ft[0], ft[1], ft[2]);
                    const p1 = new THREE.Vector3(ft[3], ft[4], ft[5]);
                    const dir = new THREE.Vector3().subVectors(p1, p0);
                    const len = Math.max(dir.length(), 0.01);
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 16), mat);
                    mesh.position.addVectors(p0, p1).multiplyScalar(0.5);
                    if (len > 0.001) {
                        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
                    }
                } else {
                    const hh = geom.halfHeight || 0.015;
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, hh*2, 16), mat);
                    const lp = geom.pos || [0,0,0];
                    mesh.position.set(lp[0], lp[1], lp[2]);
                }
            }
            if (mesh) {
                mesh.castShadow = true;
                mesh.userData.bodyIndex = bi;
                group.add(mesh);
            }
        }

        worldGroup.add(group);
        links[bi].meshGroup = group;
    }

    // Initialize drag interaction
    initDragControls();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

// ---------------------------------------------------------------------------
// Drag interaction
// ---------------------------------------------------------------------------
function threeToPhysX(v) { return new THREE.Vector3(v.x, -v.z, v.y); }

function initDragControls() {
    dragState.raycaster = new THREE.Raycaster();
    dragState.mousePos = new THREE.Vector2();
    dragState.localHit = new THREE.Vector3();
    dragState.worldHit = new THREE.Vector3();
    dragState.currentWorld = new THREE.Vector3();

    dragState.arrow = new THREE.ArrowHelper(
        new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), 1, 0xffff00
    );
    dragState.arrow.visible = false;
    dragState.arrow.line.material.transparent = true;
    dragState.arrow.cone.material.transparent = true;
    dragState.arrow.line.material.opacity = 0.7;
    dragState.arrow.cone.material.opacity = 0.7;
    scene3d.add(dragState.arrow);

    const canvas = renderer.domElement;
    canvas.addEventListener('pointerdown', onDragPointerDown, true);
    document.addEventListener('pointermove', onDragPointerMove, true);
    document.addEventListener('pointerup', onDragPointerUp, true);
}

function updateDragRaycaster(x, y) {
    const rect = renderer.domElement.getBoundingClientRect();
    dragState.mousePos.x = ((x - rect.left) / rect.width) * 2 - 1;
    dragState.mousePos.y = -((y - rect.top) / rect.height) * 2 + 1;
    dragState.raycaster.setFromCamera(dragState.mousePos, camera);
}

function recomputeDragTarget() {
    updateDragRaycaster(dragState.lastClientX, dragState.lastClientY);
    const hitPoint = dragState.raycaster.ray.origin.clone()
        .addScaledVector(dragState.raycaster.ray.direction, dragState.grabDistance);
    dragState.currentWorld.copy(hitPoint);
}

function findPhysicsBody(obj) {
    let cur = obj;
    while (cur) {
        if (cur.userData.bodyIndex !== undefined) return { type: 'link', index: cur.userData.bodyIndex };
        cur = cur.parent;
    }
    return null;
}

function onDragPointerDown(evt) {
    if (evt.button !== 0) return;
    // In third-person mode, left-click is slash action, not drag
    if (thirdPersonMode) return;
    dragState.lastClientX = evt.clientX;
    dragState.lastClientY = evt.clientY;
    updateDragRaycaster(evt.clientX, evt.clientY);

    const intersects = dragState.raycaster.intersectObjects(worldGroup.children, true);
    dragState.mouseDown = true;

    for (const hit of intersects) {
        const body = findPhysicsBody(hit.object);
        if (!body) continue;

        let pxBody = null;
        if (body.type === 'link') pxBody = links[body.index].link;
        if (!pxBody) continue;

        dragState.physicsBody = pxBody;
        dragState.active = true;
        dragState.grabDistance = hit.distance;

        const hitPoint = dragState.raycaster.ray.origin.clone()
            .addScaledVector(dragState.raycaster.ray.direction, hit.distance);

        dragState.localHit.copy(hitPoint);
        hit.object.worldToLocal(dragState.localHit);
        dragState._hitObject = hit.object;

        dragState.worldHit.copy(hitPoint);
        dragState.currentWorld.copy(hitPoint);
        dragState.arrow.position.copy(hitPoint);
        dragState.arrow.visible = true;

        controls.enabled = false;
        break;
    }
}

function onDragPointerMove(evt) {
    dragState.lastClientX = evt.clientX;
    dragState.lastClientY = evt.clientY;
    if (!dragState.mouseDown || !dragState.active) return;
    recomputeDragTarget();
    updateDragArrow();
}

function onDragPointerUp(evt) {
    if (evt.button !== 0) return;
    dragState.mouseDown = false;
    dragState.active = false;
    dragState.physicsBody = null;
    dragState.arrow.visible = false;
    controls.enabled = true;
}

function updateDragArrow() {
    if (!dragState.active || !dragState._hitObject) return;
    dragState.worldHit.copy(dragState.localHit);
    dragState._hitObject.localToWorld(dragState.worldHit);

    const dir = dragState.currentWorld.clone().sub(dragState.worldHit);
    const len = dir.length();
    if (len > 0.001) {
        dragState.arrow.position.copy(dragState.worldHit);
        dragState.arrow.setDirection(dir.normalize());
        dragState.arrow.setLength(len, Math.min(len * 0.3, 0.3), Math.min(len * 0.15, 0.15));
        dragState.arrow.visible = true;
    } else {
        dragState.arrow.visible = false;
    }
}

function applyDragForce() {
    if (!dragState.active || !dragState.physicsBody) return;
    recomputeDragTarget();
    updateDragArrow();

    const displacement = dragState.currentWorld.clone().sub(dragState.worldHit);
    const pxDisp = threeToPhysX(displacement);
    const pxHitPt = threeToPhysX(dragState.worldHit);

    let mass = 1.0;
    try { mass = dragState.physicsBody.getMass(); } catch(e) {}

    const force = new PhysX.PxVec3(
        pxDisp.x * mass * DRAG_STIFFNESS,
        pxDisp.y * mass * DRAG_STIFFNESS,
        pxDisp.z * mass * DRAG_STIFFNESS
    );
    const point = new PhysX.PxVec3(pxHitPt.x, pxHitPt.y, pxHitPt.z);

    try {
        PhysX.PxRigidBodyExt.prototype.addForceAtPos(
            dragState.physicsBody, force, point
        );
    } catch(e) {
        try { dragState.physicsBody.addForce(force); } catch(e2) {}
    }
}

// ---------------------------------------------------------------------------
// Update Three.js meshes from PhysX link poses
// ---------------------------------------------------------------------------
function updateMeshes() {
    for (const entry of links) {
        if (!entry.meshGroup) continue;
        const pose = entry.link.getGlobalPose();
        const p = pose.get_p();
        const q = pose.get_q();
        entry.meshGroup.position.set(p.get_x(), p.get_y(), p.get_z());
        entry.meshGroup.quaternion.set(q.get_x(), q.get_y(), q.get_z(), q.get_w());
    }
}

// ---------------------------------------------------------------------------
// Quaternion / vector math utilities for observation building.
// ---------------------------------------------------------------------------

function quatRotateVec(q, v) {
    const [qx, qy, qz, qw] = q;
    const [vx, vy, vz] = v;
    const tx = 2 * (qy*vz - qz*vy);
    const ty = 2 * (qz*vx - qx*vz);
    const tz = 2 * (qx*vy - qy*vx);
    return [
        vx + qw*tx + (qy*tz - qz*ty),
        vy + qw*ty + (qz*tx - qx*tz),
        vz + qw*tz + (qx*ty - qy*tx)
    ];
}

function quatMul(a, b) {
    const [ax,ay,az,aw] = a, [bx,by,bz,bw] = b;
    return [
        aw*bx + ax*bw + ay*bz - az*by,
        aw*by - ax*bz + ay*bw + az*bx,
        aw*bz + ax*by - ay*bx + az*bw,
        aw*bw - ax*bx - ay*by - az*bz
    ];
}

function quatNorm(q) {
    const [x,y,z,w] = q;
    const len = Math.sqrt(x*x + y*y + z*z + w*w) || 1;
    return [x/len, y/len, z/len, w/len];
}

function axisAngleToQuat(axis, angle) {
    const ha = angle * 0.5;
    const s = Math.sin(ha), c = Math.cos(ha);
    const len = Math.sqrt(axis[0]*axis[0] + axis[1]*axis[1] + axis[2]*axis[2]) || 1;
    return quatNorm([axis[0]/len*s, axis[1]/len*s, axis[2]/len*s, c]);
}

function expMapToQuat(ex, ey, ez) {
    const angle = Math.sqrt(ex*ex + ey*ey + ez*ez);
    if (angle < 1e-5) return [0, 0, 0, 1];
    return axisAngleToQuat([ex/angle, ey/angle, ez/angle], angle);
}

function calcHeading(q) {
    const rotDir = quatRotateVec(q, [1, 0, 0]);
    return Math.atan2(rotDir[1], rotDir[0]);
}

function calcHeadingQuatInv(q) {
    const heading = calcHeading(q);
    return axisAngleToQuat([0, 0, 1], -heading);
}

function quatToTanNorm(q) {
    const tan = quatRotateVec(q, [1, 0, 0]);
    const norm = quatRotateVec(q, [0, 0, 1]);
    return [tan[0], tan[1], tan[2], norm[0], norm[1], norm[2]];
}

// ---------------------------------------------------------------------------
// ---------------------------------------------------------------------------
// Third-person camera + WASD/joystick input
// ---------------------------------------------------------------------------
function initInputHandlers() {
    // Keyboard
    window.addEventListener('keydown', e => {
        keysDown[e.key.toLowerCase()] = true;
        // Action keys (only in third-person mode)
        if (thirdPersonMode) {
            const k = e.key.toLowerCase();
            if (k === ' ' || e.code === 'Space') { actionJump = true; e.preventDefault(); }
            else if (k === 'q') actionKick = true;
            else if (k === 'e') actionBlock = true;
        }
    });
    window.addEventListener('keyup', e => {
        keysDown[e.key.toLowerCase()] = false;
        const k = e.key.toLowerCase();
        if (k === ' ' || e.code === 'Space') actionJump = false;
        else if (k === 'q') actionKick = false;
        else if (k === 'e') actionBlock = false;
    });

    // Prevent context menu on right-click in third-person mode
    renderer.domElement.addEventListener('contextmenu', e => {
        if (thirdPersonMode) e.preventDefault();
    });

    // Mouse drag for camera orbit
    let camMouseDown = false, lastMX = 0, lastMY = 0;
    renderer.domElement.addEventListener('mousedown', e => {
        if (thirdPersonMode) {
            // Left click = slash, right click = block (actions)
            if (e.button === 0) actionSlash = true;
            if (e.button === 2) actionBlock = true;
            // Right-click also starts camera orbit
            if (e.button === 2) { camMouseDown = true; lastMX = e.clientX; lastMY = e.clientY; }
        }
    });
    window.addEventListener('mouseup', e => {
        if (e.button === 2) camMouseDown = false;
        if (e.button === 0) actionSlash = false;
        if (e.button === 2) actionBlock = false;
    });
    window.addEventListener('mousemove', e => {
        if (!camMouseDown || !thirdPersonMode) return;
        const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
        lastMX = e.clientX; lastMY = e.clientY;
        tpCamYaw -= dx * 0.005;
        tpCamPitch = Math.max(0.05, Math.min(1.2, tpCamPitch + dy * 0.005));
    });
    renderer.domElement.addEventListener('wheel', e => {
        if (!thirdPersonMode) return;
        tpCamDistance = Math.max(1.5, Math.min(10, tpCamDistance + e.deltaY * 0.005));
        e.preventDefault();
    }, { passive: false });

    // Mobile action buttons (touch)
    const actionBtnMap = [
        ['btn-jump', v => { actionJump = v; }],
        ['btn-slash', v => { actionSlash = v; }],
        ['btn-kick', v => { actionKick = v; }],
        ['btn-block', v => { actionBlock = v; }],
    ];
    for (const [id, setter] of actionBtnMap) {
        const btn = document.getElementById(id);
        if (!btn) continue;
        btn.addEventListener('touchstart', e => { e.preventDefault(); setter(true); btn.classList.add('active'); }, { passive: false });
        btn.addEventListener('touchend', e => { e.preventDefault(); setter(false); btn.classList.remove('active'); }, { passive: false });
        btn.addEventListener('touchcancel', e => { setter(false); btn.classList.remove('active'); });
        // Also support mouse for desktop testing
        btn.addEventListener('mousedown', e => { e.preventDefault(); setter(true); btn.classList.add('active'); });
        btn.addEventListener('mouseup', e => { setter(false); btn.classList.remove('active'); });
        btn.addEventListener('mouseleave', e => { setter(false); btn.classList.remove('active'); });
    }

    // Touch joystick
    const jzone = document.getElementById('joystick-zone');
    const knob = document.getElementById('joystick-knob');
    const maxR = 45; // max knob displacement

    jzone.addEventListener('touchstart', e => {
        e.preventDefault();
        joystickActive = true;
        const t = e.touches[0];
        const rect = jzone.getBoundingClientRect();
        joystickOriginX = rect.left + 70;
        joystickOriginY = rect.top + 70;
    }, { passive: false });

    window.addEventListener('touchmove', e => {
        if (!joystickActive) return;
        const t = e.touches[0];
        let dx = t.clientX - joystickOriginX;
        let dy = t.clientY - joystickOriginY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > maxR) { dx *= maxR/dist; dy *= maxR/dist; }
        knob.style.left = (70 + dx - 25) + 'px';
        knob.style.top = (70 + dy - 25) + 'px';
        inputX = dx / maxR;
        inputY = -dy / maxR; // up = forward = positive Y
    }, { passive: false });

    const endTouch = () => {
        joystickActive = false;
        inputX = 0; inputY = 0;
        knob.style.left = '45px'; knob.style.top = '45px';
    };
    window.addEventListener('touchend', endTouch);
    window.addEventListener('touchcancel', endTouch);

    // Touch orbit (two-finger or separate area)
    let lastTouchX = 0;
    renderer.domElement.addEventListener('touchstart', e => {
        if (e.touches.length === 1 && thirdPersonMode) {
            lastTouchX = e.touches[0].clientX;
        }
    });
    renderer.domElement.addEventListener('touchmove', e => {
        if (!thirdPersonMode || e.touches.length !== 1) return;
        const dx = e.touches[0].clientX - lastTouchX;
        lastTouchX = e.touches[0].clientX;
        tpCamYaw -= dx * 0.008;
    });
}

function updateInputFromKeys() {
    if (!thirdPersonMode) return;
    // Only override input if joystick is not active
    if (joystickActive) return;
    inputX = 0; inputY = 0;
    if (keysDown['w']) inputY += 1;
    if (keysDown['s']) inputY -= 1;
    if (keysDown['a']) inputX -= 1;
    if (keysDown['d']) inputX += 1;
    // Normalize diagonal
    const len = Math.sqrt(inputX*inputX + inputY*inputY);
    if (len > 1) { inputX /= len; inputY /= len; }
}

function updateThirdPersonSteering() {
    // Convert input (camera-relative) to world direction
    // Camera faces along -camYaw direction in the XY plane (Z-up)
    updateInputFromKeys();

    const speed = Math.sqrt(inputX*inputX + inputY*inputY);

    if (speed > 0.05) {
        // Input is camera-relative: Y=forward (into screen), X=right
        // Camera forward in world XY = [cos(tpCamYaw), sin(tpCamYaw)]
        const camFwd = [Math.cos(tpCamYaw), Math.sin(tpCamYaw)];
        const camRight = [Math.cos(tpCamYaw - Math.PI/2), Math.sin(tpCamYaw - Math.PI/2)];

        const worldX = inputY * camFwd[0] + inputX * camRight[0];
        const worldY = inputY * camFwd[1] + inputX * camRight[1];
        const wlen = Math.sqrt(worldX*worldX + worldY*worldY) || 1;
        tarDir = [worldX / wlen, worldY / wlen];
        tarSpeed = speed * 2.5; // map 0-1 input to 0-2.5 m/s
    } else {
        tarSpeed = 0;
    }

    // Face direction = camera forward (always face where camera looks)
    faceDir = [Math.cos(tpCamYaw), Math.sin(tpCamYaw)];

    // Disable auto-randomize timer
    steeringChangeTime = performance.now() / 1000;
    nextSteeringInterval = 999;
}

function updateThirdPersonCamera() {
    if (!thirdPersonMode || links.length === 0) return;

    const rp = links[0].link.getGlobalPose().get_p();
    // Character position in Three.js coords (worldGroup rotates Z-up → Y-up)
    // Three.js: x=physX, y=physZ, z=-physY (due to worldGroup -90° X rotation)
    const charX = rp.get_x();
    const charZ_phys = rp.get_z();
    const charY_phys = rp.get_y();

    // Camera orbit position (in Z-up physics space, then convert)
    const camX = charX - tpCamDistance * Math.cos(tpCamPitch) * Math.cos(tpCamYaw);
    const camY = charY_phys - tpCamDistance * Math.cos(tpCamPitch) * Math.sin(tpCamYaw);
    const camZ = charZ_phys + tpCamDistance * Math.sin(tpCamPitch);

    // Convert to Three.js Y-up (worldGroup rotates, but camera is outside worldGroup)
    camera.position.lerp(new THREE.Vector3(camX, camZ, -camY), 0.1);
    const lookAt = new THREE.Vector3(charX, Math.max(charZ_phys, 0.5), -charY_phys);
    controls.target.lerp(lookAt, 0.1);
}

// ---------------------------------------------------------------------------
// Build observation vector (158 dims) - same as index.html
// ---------------------------------------------------------------------------
function buildObservation() {
    const obs = new Float32Array(humanoidData.obs_dim);
    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];

    const bodyLinkMap = {};
    for (const l of links) bodyLinkMap[l.name] = l.link;

    const rootPose = links[0].link.getGlobalPose();
    const rpx = rootPose.get_p();
    const rqx = rootPose.get_q();

    const rootPos = [rpx.get_x(), rpx.get_y(), rpx.get_z()];
    const rootRot = [rqx.get_x(), rqx.get_y(), rqx.get_z(), rqx.get_w()];

    const rv = links[0].link.getLinearVelocity();
    const rootVel = [rv.get_x(), rv.get_y(), rv.get_z()];
    const raw = links[0].link.getAngularVelocity();
    const rootAngVel = [raw.get_x(), raw.get_y(), raw.get_z()];

    const headingInv = calcHeadingQuatInv(rootRot);

    let idx = 0;

    obs[idx++] = rootPos[2];

    const localRootRot = quatMul(headingInv, rootRot);
    const rootTanNorm = quatToTanNorm(localRootRot);
    for (let i = 0; i < 6; i++) obs[idx++] = rootTanNorm[i];

    const localVel = quatRotateVec(headingInv, rootVel);
    obs[idx++] = localVel[0];
    obs[idx++] = localVel[1];
    obs[idx++] = localVel[2];

    const localAngVel = quatRotateVec(headingInv, rootAngVel);
    obs[idx++] = localAngVel[0];
    obs[idx++] = localAngVel[1];
    obs[idx++] = localAngVel[2];

    const dofPositions = new Float32Array(31);
    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
        const dof = humanoidData.dofInfo[i];
        const childLink = bodyLinkMap[dof.child_body];
        if (childLink) {
            try {
                const joint = childLink.getInboundJoint();
                dofPositions[i] = joint.getJointPosition(axisEnums[dof.physx_axis]);
            } catch(e) { dofPositions[i] = 0; }
        }
    }

    const jointRotQuats = [];
    for (const kj of humanoidData.kinematicJoints) {
        let quat;
        if (kj.type === 'SPHERICAL') {
            const ex = dofPositions[kj.dof_idx];
            const ey = dofPositions[kj.dof_idx + 1];
            const ez = dofPositions[kj.dof_idx + 2];
            quat = expMapToQuat(ex, ey, ez);
        } else if (kj.type === 'HINGE') {
            const angle = dofPositions[kj.dof_idx];
            quat = axisAngleToQuat(kj.axis, angle);
        } else {
            quat = [0, 0, 0, 1];
        }
        jointRotQuats.push(quat);
        const tn = quatToTanNorm(quat);
        for (let k = 0; k < 6; k++) obs[idx++] = tn[k];
    }

    for (const dof of humanoidData.dofInfo) {
        try {
            const childLink = bodyLinkMap[dof.child_body];
            if (childLink) {
                const joint = childLink.getInboundJoint();
                obs[idx++] = joint.getJointVelocity(axisEnums[dof.physx_axis]);
            } else { obs[idx++] = 0; }
        } catch(e) { obs[idx++] = 0; }
    }

    {
        const keyIds = humanoidData.key_body_ids || [2, 5, 10, 13, 16, 6];
        for (const bid of keyIds) {
            const linkPose = links[bid].link.getGlobalPose();
            const lp = linkPose.get_p();
            const bp = [lp.get_x(), lp.get_y(), lp.get_z()];
            const rel = [bp[0] - rootPos[0], bp[1] - rootPos[1], bp[2] - rootPos[2]];
            const localRel = quatRotateVec(headingInv, rel);
            obs[idx++] = localRel[0];
            obs[idx++] = localRel[1];
            obs[idx++] = localRel[2];
        }
    }

    return obs;
}

// ---------------------------------------------------------------------------
// Build task observation vector (5 dims) for HRL steering task
// Layout: local_tar_dir(2) + tar_speed(1) + local_face_dir(2)
// ---------------------------------------------------------------------------
function buildTaskObs() {
    const taskObs = new Float32Array(5);

    // Get root rotation and heading inverse
    const rootPose = links[0].link.getGlobalPose();
    const rqx = rootPose.get_q();
    const rootRot = [rqx.get_x(), rqx.get_y(), rqx.get_z(), rqx.get_w()];
    const headingInv = calcHeadingQuatInv(rootRot);

    // Transform tarDir into local (heading) frame
    const tarDir3d = [tarDir[0], tarDir[1], 0];
    const localTarDir = quatRotateVec(headingInv, tarDir3d);

    // Transform faceDir into local (heading) frame
    const faceDir3d = [faceDir[0], faceDir[1], 0];
    const localFaceDir = quatRotateVec(headingInv, faceDir3d);

    taskObs[0] = localTarDir[0];
    taskObs[1] = localTarDir[1];
    taskObs[2] = tarSpeed;
    taskObs[3] = localFaceDir[0];
    taskObs[4] = localFaceDir[1];

    return taskObs;
}

// ---------------------------------------------------------------------------
// Random latent vector (unit sphere) - for ASE mode
// ---------------------------------------------------------------------------
let latentTarget = null;
let latentBlendRate = 0.05;

function randomLatent() {
    const dim = humanoidData.latent_dim || 64;
    latentVec = new Float32Array(dim);
    let norm = 0;
    for (let i = 0; i < dim; i++) { latentVec[i] = gaussianRandom(); norm += latentVec[i] * latentVec[i]; }
    norm = Math.sqrt(norm);
    for (let i = 0; i < dim; i++) latentVec[i] /= norm;
    latentTarget = new Float32Array(latentVec);
    console.log('Random latent sampled');
}

function newLatentTarget() {
    const dim = humanoidData.latent_dim || 64;
    latentTarget = new Float32Array(dim);
    let norm = 0;
    for (let i = 0; i < dim; i++) { latentTarget[i] = gaussianRandom(); norm += latentTarget[i] * latentTarget[i]; }
    norm = Math.sqrt(norm);
    for (let i = 0; i < dim; i++) latentTarget[i] /= norm;
}

function slerpLatent() {
    if (!latentTarget || !latentVec) return;
    const dim = latentVec.length;
    let norm = 0;
    for (let i = 0; i < dim; i++) {
        latentVec[i] += latentBlendRate * (latentTarget[i] - latentVec[i]);
        norm += latentVec[i] * latentVec[i];
    }
    norm = Math.sqrt(norm);
    if (norm > 1e-8) for (let i = 0; i < dim; i++) latentVec[i] /= norm;
}

// ---------------------------------------------------------------------------
// ONNX inference - split model (HLC + LLC)
// ---------------------------------------------------------------------------
// Both modes share the same LLC. In HRL mode, the HLC produces the latent z
// from task observations. In ASE mode, z comes from the manual latent vector.
async function runPolicyHRL(obs, taskObs) {
    // If any action button is pressed, bypass HLC and use hardcoded latent
    let actionLatent = null;
    if (actionSlash) actionLatent = ACTION_LATENTS.slash;
    else if (actionKick) actionLatent = ACTION_LATENTS.kick;
    else if (actionBlock) actionLatent = ACTION_LATENTS.block;
    else if (actionJump) actionLatent = ACTION_LATENTS.jump;

    const obsTensor = new ort.Tensor('float32', obs, [1, humanoidData.obs_dim]);

    if (actionLatent) {
        // Direct LLC with hardcoded latent - bypass HLC entirely
        const latentTensor = new ort.Tensor('float32', actionLatent, [1, humanoidData.latent_dim || 64]);
        const llcResult = await onnxSessionLLC.run({ obs: obsTensor, latent: latentTensor });
        return llcResult.action.data;
    } else {
        if (!onnxSessionHLC) return null;
        // Normal HLC -> LLC pipeline for steering
        const taskObsTensor = new ort.Tensor('float32', taskObs, [1, 5]);
        const hlcResult = await onnxSessionHLC.run({ obs: obsTensor, task_obs: taskObsTensor });
        const z = hlcResult.z.data;
        const latentTensor = new ort.Tensor('float32', z, [1, humanoidData.latent_dim || 64]);
        const llcResult = await onnxSessionLLC.run({ obs: obsTensor, latent: latentTensor });
        return llcResult.action.data;
    }
}

async function runPolicyASE(obs) {
    // LLC: obs + manual latent → action
    const obsTensor = new ort.Tensor('float32', obs, [1, humanoidData.obs_dim]);
    const latentTensor = new ort.Tensor('float32', latentVec, [1, humanoidData.latent_dim || 64]);
    const results = await onnxSessionLLC.run({ obs: obsTensor, latent: latentTensor });
    return results.action.data;
}

// ---------------------------------------------------------------------------
// Apply actions as PD drive targets
// ---------------------------------------------------------------------------
function applyActions(action) {
    const axisEnums = [E_TWIST, E_SWING1, E_SWING2];
    const bodyLinkMap = {};
    for (const l of links) bodyLinkMap[l.name] = l.link;

    const aLow = humanoidData.action_low;
    const aHigh = humanoidData.action_high;

    let appliedCount = 0;
    let clippedMin = Infinity, clippedMax = -Infinity;
    let rawMin = Infinity, rawMax = -Infinity;
    for (let i = 0; i < humanoidData.dofInfo.length; i++) {
        const dof = humanoidData.dofInfo[i];
        const childLink = bodyLinkMap[dof.child_body];
        if (!childLink) { continue; }
        try {
            const joint = childLink.getInboundJoint();
            if (!joint) continue;
            let a = action[i];
            rawMin = Math.min(rawMin, a);
            rawMax = Math.max(rawMax, a);
            if (aLow && aHigh) {
                a = Math.max(aLow[i], Math.min(aHigh[i], a));
            }
            clippedMin = Math.min(clippedMin, a);
            clippedMax = Math.max(clippedMax, a);
            joint.setDriveTarget(axisEnums[dof.physx_axis], a);
            appliedCount++;
        } catch(e) {
            if (!window._applyWarnLogged) {
                console.warn('setDriveTarget failed for', dof.axis_name, ':', e.message);
                window._applyWarnLogged = true;
            }
        }
    }
}

// ---------------------------------------------------------------------------
// Reset
// ---------------------------------------------------------------------------
let _postResetHooks = [];

function resetHumanoid() {
    prevAction = null;
    dragState.active = false;
    dragState.mouseDown = false;
    dragState.physicsBody = null;
    if (dragState.arrow) dragState.arrow.visible = false;
    controls.enabled = true;

    pxScene.removeArticulation(articulation);
    for (const entry of links) {
        if (entry.meshGroup) worldGroup.remove(entry.meshGroup);
    }
    links = [];
    buildArticulation();
    // Recreate meshes
    for (let bi = 0; bi < humanoidData.bodies.length; bi++) {
        const body = humanoidData.bodies[bi];
        const group = new THREE.Group();
        const color = BODY_COLORS[body.name] || 0x888888;
        for (const geom of body.geoms) {
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.2 });
            let mesh = null;
            if (geom.type === 'sphere') {
                mesh = new THREE.Mesh(new THREE.SphereGeometry(geom.radius, 16, 12), mat);
                const lp = geom.pos;
                mesh.position.set(lp[0], lp[1], lp[2]);
            } else if (geom.type === 'capsule' && geom.fromto) {
                const ft = geom.fromto;
                const p0 = new THREE.Vector3(ft[0], ft[1], ft[2]);
                const p1 = new THREE.Vector3(ft[3], ft[4], ft[5]);
                const dir = new THREE.Vector3().subVectors(p1, p0);
                const len = dir.length();
                mesh = new THREE.Mesh(new THREE.CapsuleGeometry(geom.radius, len, 8, 12), mat);
                mesh.position.addVectors(p0, p1).multiplyScalar(0.5);
                if (len > 0.001) mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
            } else if (geom.type === 'box') {
                const he = geom.halfExtents;
                mesh = new THREE.Mesh(new THREE.BoxGeometry(he[0]*2, he[1]*2, he[2]*2), mat);
                const lp = geom.pos;
                mesh.position.set(lp[0], lp[1], lp[2]);
            } else if (geom.type === 'cylinder') {
                const r = geom.radius;
                if (geom.fromto) {
                    const ft = geom.fromto;
                    const p0 = new THREE.Vector3(ft[0], ft[1], ft[2]);
                    const p1 = new THREE.Vector3(ft[3], ft[4], ft[5]);
                    const dir = new THREE.Vector3().subVectors(p1, p0);
                    const len = Math.max(dir.length(), 0.01);
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 16), mat);
                    mesh.position.addVectors(p0, p1).multiplyScalar(0.5);
                    if (len > 0.001) mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
                } else {
                    const hh = geom.halfHeight || 0.015;
                    mesh = new THREE.Mesh(new THREE.CylinderGeometry(r, r, hh*2, 16), mat);
                    const lp = geom.pos || [0,0,0];
                    mesh.position.set(lp[0], lp[1], lp[2]);
                }
            }
            if (mesh) {
                mesh.castShadow = true;
                mesh.userData.bodyIndex = bi;
                group.add(mesh);
            }
        }
        worldGroup.add(group);
        links[bi].meshGroup = group;
    }
    // Reset steering
    resetSteering();
    // Run post-reset hooks
    for (const hook of _postResetHooks) hook();
}

// ---------------------------------------------------------------------------
// Main loop
// ---------------------------------------------------------------------------
async function mainLoop(timestamp) {
    if (!running) return;

    frameCount++;
    if (timestamp - lastFpsTime > 1000) {
        document.getElementById('fpsDisplay').textContent = `FPS: ${frameCount}`;
        if (window._guiStats) window._guiStats.fps = frameCount;
        frameCount = 0;
        lastFpsTime = timestamp;
    }

    if (!window._lastSimTimestamp) window._lastSimTimestamp = timestamp;
    const realDT = Math.min((timestamp - window._lastSimTimestamp) / 1000, 0.1);
    window._lastSimTimestamp = timestamp;

    if (!window._simAccum) window._simAccum = 0;
    window._simAccum += realDT * timeScale;

    const maxSubstepsPerFrame = 8;
    let stepsThisFrame = 0;
    while (window._simAccum >= DT && stepsThisFrame < maxSubstepsPerFrame) {
        window._simAccum -= DT;
        stepsThisFrame++;

        if (!window._physStepCount) window._physStepCount = 0;
        window._physStepCount++;

        if (window._physStepCount >= numSubsteps) {
            window._physStepCount = 0;

            // Run policy (mode-dependent)
            if (policyEnabled) {
                try {
                    const obs = buildObservation();
                    if (currentMode === 'hrl') {
                        const taskObs = buildTaskObs();
                        currentAction = await runPolicyHRL(obs, taskObs);
                    } else {
                        slerpLatent();
                        currentAction = await runPolicyASE(obs);
                    }
                    if (currentAction) applyActions(currentAction);
                } catch (e) {
                    if (!window._policyErrCount) window._policyErrCount = 0;
                    if (++window._policyErrCount <= 3) console.error('Policy error:', e.message);
                    if (!currentAction) currentAction = new Float32Array(humanoidData.act_dim);
                }
            } else {
                applyActions(new Float32Array(humanoidData.init_dof_pos || humanoidData.act_dim));
            }
        }

        applyDragForce();

        pxScene.simulate(DT);
        pxScene.fetchResults(true);
        if (restoreGroundAfterStep) { restoreGround(); restoreGroundAfterStep = false; }
    }

    // Update steering (periodic direction changes, arrow visualization)
    if (currentMode === 'hrl') updateSteering();

    // Auto-reset if physics explodes
    try {
        const rz = links[0].link.getGlobalPose().get_p().get_z();
        if (resetGraceFrames > 0) resetGraceFrames--;
        else if (isNaN(rz) || Math.abs(rz) > 50) { resetHumanoid(); resetGraceFrames = RESET_GRACE; }
    } catch(e) {}

    // Third-person: update steering from input before next frame
    if (thirdPersonMode && currentMode === 'hrl') {
        updateThirdPersonSteering();
    }

    // Camera tracking
    if (thirdPersonMode) {
        updateThirdPersonCamera();
    } else {
        const rp = links[0].link.getGlobalPose().get_p();
        controls.target.lerp(new THREE.Vector3(rp.get_x(), Math.max(rp.get_z(), 0.5), -rp.get_y()), 0.05);
    }

    updateMeshes();
    updateDebugInfo();
    controls.update();
    renderer.render(scene3d, camera);
    requestAnimationFrame(mainLoop);
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
async function init() {
    try {
        await Promise.all([loadOnnxModel(), initPhysX()]);
        await loadHumanoidData();

        setStatus('Building humanoid...');
        buildArticulation();

        initThreeJS();
        initInputHandlers();

        // Create steering arrow helpers (in worldGroup, Z-up coordinates)
        moveDirArrow = new THREE.ArrowHelper(
            new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0.05), 1.5, 0xff3333
        );
        moveDirArrow.line.material.linewidth = 2;
        worldGroup.add(moveDirArrow);

        faceDirArrow = new THREE.ArrowHelper(
            new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0.05), 1.0, 0x3333ff
        );
        faceDirArrow.line.material.linewidth = 2;
        worldGroup.add(faceDirArrow);

        // Initialize latent vector for ASE mode
        randomLatent();

        // Initialize steering
        resetSteering();

        document.getElementById('overlay').style.display = 'none';

        // Build lil-gui panel
        const gui = new GUI({ title: 'MimicKit' });

        // Mode toggle
        const modeParams = { mode: 'HRL Steering' };
        const modeOptions = onnxSessionHLC ? ['HRL Steering', 'ASE Latent'] : ['ASE Latent'];
        gui.add(modeParams, 'mode', modeOptions).name('Mode').onChange(v => {
            currentMode = v === 'HRL Steering' ? 'hrl' : 'ase';
            document.querySelector('#hud .title').textContent =
                currentMode === 'hrl' ? 'HRL Steering Task - Sword & Shield' : 'ASE Latent Mode - Sword & Shield';
            // Show/hide steering arrows in ASE mode
            if (moveDirArrow) moveDirArrow.visible = (currentMode === 'hrl');
            if (faceDirArrow) faceDirArrow.visible = (currentMode === 'hrl');
            console.log('Mode:', currentMode);
        });

        // Third-person mode toggle
        const isTouchDevice = 'ontouchstart' in window;
        const tpToggle = gui.add({ thirdPerson: true }, 'thirdPerson').name('Third Person (WASD)').onChange(v => {
            thirdPersonMode = v;
            controls.enabled = !v;  // disable orbit controls in third-person
            document.getElementById('joystick-zone').style.display = (v && isTouchDevice) ? 'block' : 'none';
            document.getElementById('action-buttons').style.display = (v && isTouchDevice) ? 'grid' : 'none';
            document.getElementById('controls-hud').style.display = (v && !isTouchDevice) ? 'block' : 'none';
            document.getElementById('action-buttons').style.display = (v && isTouchDevice) ? 'grid' : 'none';
            // Hide steering arrows + sliders in third-person (input replaces them)
            if (moveDirArrow) moveDirArrow.visible = !v && currentMode === 'hrl';
            if (faceDirArrow) faceDirArrow.visible = !v && currentMode === 'hrl';
            // Clear action states when leaving third-person
            if (!v) { actionSlash = false; actionKick = false; actionBlock = false; actionJump = false; }
        });

        // Reset button (resets humanoid and steering)
        gui.add({ reset: () => { resetHumanoid(); if (currentMode === 'ase') randomLatent(); } }, 'reset').name('Reset');

        // ASE mode controls
        const aseFolder = gui.addFolder('ASE Latent');
        aseFolder.add({ randomSkill: () => { randomLatent(); resetHumanoid(); } }, 'randomSkill').name('Random Skill + Reset');
        aseFolder.add({ newTarget: newLatentTarget }, 'newTarget').name('New Latent Target');

        // HRL mode controls
        const hrlFolder = gui.addFolder('HRL Steering');
        const modelParams = { model: 'v2 (wide speed + perturb)' };
        hrlFolder.add(modelParams, 'model', {
            'v1 (narrow speed)': './hlc_steering_v1.onnx',
            'v2 (wide speed + perturb)': './hlc_steering_v2.onnx',
        }).name('HLC Model').onChange(async v => {
            setStatus('Switching model...');
            document.getElementById('overlay').style.display = 'flex';
            await loadHLC(v);
            document.getElementById('overlay').style.display = 'none';
        });
        const steerParams = {
            moveAngle: 0,
            faceAngle: 0,
            speed: 1.5,
        };
        function updateFromSliders() {
            const ma = steerParams.moveAngle * Math.PI / 180;
            tarDir = [Math.cos(ma), Math.sin(ma)];
            const fa = steerParams.faceAngle * Math.PI / 180;
            faceDir = [Math.cos(fa), Math.sin(fa)];
            tarSpeed = steerParams.speed;
            // Reset timer so auto-randomize doesn't override immediately
            steeringChangeTime = performance.now() / 1000;
            nextSteeringInterval = 999;
        }
        hrlFolder.add(steerParams, 'moveAngle', -180, 180, 1).name('Move Direction').onChange(updateFromSliders);
        hrlFolder.add(steerParams, 'faceAngle', -180, 180, 1).name('Face Direction').onChange(updateFromSliders);
        hrlFolder.add(steerParams, 'speed', 0, 3.0, 0.1).name('Speed').onChange(updateFromSliders);
        hrlFolder.add({ randomize: () => {
            resetSteering();
            // Sync sliders back
            steerParams.moveAngle = Math.round(Math.atan2(tarDir[1], tarDir[0]) * 180 / Math.PI);
            steerParams.faceAngle = Math.round(Math.atan2(faceDir[1], faceDir[0]) * 180 / Math.PI);
            steerParams.speed = tarSpeed;
            hrlFolder.controllersRecursive().forEach(c => c.updateDisplay());
        }}, 'randomize').name('Randomize');

        // Simulation folder
        const simFolder = gui.addFolder('Simulation');
        const simParams = {
            drives: drivesEnabled,
            policy: policyEnabled,
            selfCollision: selfCollisionEnabled,
            gravity: gravityEnabled,
            gravityStrength: -9.81,
            substeps: numSubsteps,
        };
        simFolder.add(simParams, 'drives').name('Active Drives').onChange(v => { drivesEnabled = v; applyDriveParams(); });
        simFolder.add(simParams, 'policy').name('NN Policy').onChange(v => { policyEnabled = v; });
        simFolder.add(simParams, 'selfCollision').name('Self-Collision').onChange(v => { setSelfCollision(v); });
        simFolder.add(simParams, 'gravity').name('Gravity').onChange(v => { setGravity(v); });
        simFolder.add(simParams, 'gravityStrength', -20, 0, 0.1).name('Gravity Strength').onChange(v => {
            pxScene.setGravity(new PhysX.PxVec3(0, 0, v));
        });
        simFolder.add(simParams, 'substeps', 1, 16, 1).name('Substeps').onChange(v => { numSubsteps = v; });

        simFolder.close();

        // Enable third-person mode by default
        controls.enabled = false;
        document.getElementById('joystick-zone').style.display = isTouchDevice ? 'block' : 'none';
        document.getElementById('action-buttons').style.display = isTouchDevice ? 'grid' : 'none';
        document.getElementById('controls-hud').style.display = !isTouchDevice ? 'block' : 'none';
        if (moveDirArrow) moveDirArrow.visible = false;
        if (faceDirArrow) faceDirArrow.visible = false;

        // Collapse the entire GUI panel
        gui.close();

        const stats = { root_z: 0, root_speed: 0, max_dof_vel: 0, fps: 0 };
        window._guiStats = stats;

        // Y-axis constraint via D6 joint
        let yConstraintJoint = null;
        let yConstraintActor = null;
        function enableYConstraint() {
            if (yConstraintJoint) return;
            const rootPose = links[0].link.getGlobalPose();
            const rp = rootPose.get_p();
            const anchorPose = new PhysX.PxTransform(
                new PhysX.PxVec3(rp.get_x(), 0, rp.get_z()),
                new PhysX.PxQuat(0, 0, 0, 1)
            );
            yConstraintActor = physics.createRigidStatic(anchorPose);
            pxScene.addActor(yConstraintActor);

            const localFrame0 = new PhysX.PxTransform(new PhysX.PxVec3(0,0,0), new PhysX.PxQuat(0,0,0,1));
            const localFrame1 = new PhysX.PxTransform(
                new PhysX.PxVec3(0, rp.get_y(), 0),
                new PhysX.PxQuat(0, 0, 0, 1)
            );
            yConstraintJoint = PhysX.PxTopLevelFunctions.prototype.D6JointCreate(
                physics, yConstraintActor, localFrame0, links[0].link, localFrame1
            );
            if (yConstraintJoint) {
                yConstraintJoint.setMotion(PhysX.PxD6AxisEnum.eX, PhysX.PxD6MotionEnum.eFREE);
                yConstraintJoint.setMotion(PhysX.PxD6AxisEnum.eY, PhysX.PxD6MotionEnum.eLOCKED);
                yConstraintJoint.setMotion(PhysX.PxD6AxisEnum.eZ, PhysX.PxD6MotionEnum.eFREE);
                yConstraintJoint.setMotion(PhysX.PxD6AxisEnum.eTWIST, PhysX.PxD6MotionEnum.eFREE);
                yConstraintJoint.setMotion(PhysX.PxD6AxisEnum.eSWING1, PhysX.PxD6MotionEnum.eFREE);
                yConstraintJoint.setMotion(PhysX.PxD6AxisEnum.eSWING2, PhysX.PxD6MotionEnum.eFREE);
                console.log('Y constraint enabled via D6 joint');
            } else {
                console.error('Failed to create D6 joint for Y constraint');
            }
        }
        function disableYConstraint() {
            if (yConstraintJoint) { yConstraintJoint.release(); yConstraintJoint = null; }
            if (yConstraintActor) { pxScene.removeActor(yConstraintActor); yConstraintActor.release(); yConstraintActor = null; }
            console.log('Y constraint disabled');
        }
        simParams.lockY = false;
        simFolder.add(simParams, 'lockY').name('Lock Y Axis').onChange(v => {
            if (v) enableYConstraint(); else disableYConstraint();
        });

        // Register post-reset hooks
        _postResetHooks.push(() => {
            setSelfCollision(simParams.selfCollision);
            setGravity(simParams.gravity);
            if (simParams.gravity) pxScene.setGravity(new PhysX.PxVec3(0, 0, simParams.gravityStrength));
            applyDriveParams();
            yConstraintJoint = null; yConstraintActor = null;
            if (simParams.lockY) enableYConstraint();
        });

        running = true;
        lastFpsTime = performance.now();
        requestAnimationFrame(mainLoop);
        console.log('Demo running!');
    } catch (err) {
        setStatus('Error: ' + err.message);
        console.error(err);
    }
}

init();
</script>
</body>
</html>
